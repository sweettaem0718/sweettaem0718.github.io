<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>TAEMIN4CUT | 태민네컷</title>
    <meta name="description" content="TAEMIN4CUT 태민네컷 - 웹캠 4컷 촬영과 태민 포토프레임 합성"/>
    <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
<header class="site-header">
    <div class="brand">
        <div class="brand-title">TAEMIN4CUT</div>
        <div class="brand-sub" id="brandSub">태민네컷</div>
    </div>
    <div class="header-controls">
        <div class="step-indicator" id="stepIndicator">STEP 1. 촬영 준비</div>
        <label class="language-switch-label" id="langSwitcherLabel" for="langSwitcher">Language</label>
        <select id="langSwitcher" class="language-switch" aria-label="Language">
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="zh">中文</option>
        </select>
    </div>
</header>

<div class="consent-modal-backdrop hidden" id="consentModal" role="dialog" aria-modal="true" aria-labelledby="consentTitle">
    <div class="consent-modal">
        <h2 id="consentTitle">서비스 이용 동의</h2>
        <p id="consentBody">본 서비스는 촬영된 사진을 서버에 저장하지 않으며, 사용자의 정보를 수집하지 않습니다.</p>
        <div class="action-row">
            <button type="button" id="consentAgreeBtn" class="primary consent-button">동의하고 시작하기</button>
        </div>
    </div>
</div>

<div class="consent-modal-backdrop hidden" id="desktopNoticeModal" role="dialog" aria-modal="true" aria-labelledby="desktopNoticeTitle">
    <div class="consent-modal">
        <h2 id="desktopNoticeTitle">모바일 최적화 안내</h2>
        <p id="desktopNoticeBody">이 사이트는 모바일 환경에 최적화되어 있습니다.</p>
        <div class="action-row">
            <button type="button" id="desktopNoticeConfirmBtn" class="primary consent-button">확인</button>
        </div>
    </div>
</div>

<main class="workspace">
    <section class="panel frame-panel" id="framePanel">
        <div class="panel-header">
            <h2 id="framePanelTitle">프레임 선택</h2>
            <div class="hint" id="framePanelHint">원하는 프레임을 선택하면 촬영 화면으로 이동합니다.</div>
        </div>

        <div class="frame-list" id="frameList"></div>

        <div class="action-row">
            <button type="button" id="startCaptureBtn" class="primary" disabled>촬영 시작</button>
        </div>
    </section>

    <section class="panel capture-panel hidden" id="capturePanel">
        <div class="panel-header">
            <h2 id="capturePanelTitle">촬영 / 편집</h2>
            <div class="cut-status" id="cutStatus">컷 1 / 4</div>
        </div>

        <div class="layout-select">
            <label class="label" id="layoutLabel">레이아웃</label>
            <div class="layout-options">
                <span class="pill active" id="layoutVerticalPill">1x4 세로</span>
                <button type="button" id="cameraMirrorBtn" class="pill mirror-toggle active">카메라 반전 ON</button>
            </div>
        </div>

        <div class="camera-stage">
            <div class="camera-box" id="cameraBox">
                <video id="cameraPreview" autoplay playsinline class="hidden"></video>
                <canvas id="liveFrameCanvas"></canvas>
                <canvas id="captureCanvas" class="hidden"></canvas>
                <div class="camera-overlay" id="cameraMessage">웹캠을 불러오는 중...</div>
            </div>

            <div class="capture-controls" id="captureControls">
                <div class="action-row hidden" id="captureBtnRow">
                    <button type="button" id="captureBtn" class="primary" aria-label="촬영">●</button>
                </div>

                <div class="action-row bottom-save">
                    <button type="button" id="saveBtn" class="primary save-button" disabled>저장하기</button>
                </div>
                <div class="action-row bottom-retry">
                    <button type="button" id="retryBtn" class="primary retry-button">다시하기</button>
                </div>
            </div>
        </div>

        <div class="status-message" id="statusMessage"></div>
        <noscript id="noscriptMessage">이 서비스는 JavaScript가 필요합니다.</noscript>
    </section>

    <div class="toast" id="toast">
        <span class="toast-icon" aria-hidden="true"></span>
        <div class="toast-content">
            <div class="toast-title" id="toastTitle">안내</div>
            <div class="toast-message" id="toastMessage">사진을 클릭 시 촬영됩니다.</div>
        </div>
    </div>
    <div id="confettiLayer" class="confetti-layer" aria-hidden="true"></div>

    <canvas id="finalCanvas" class="hidden"></canvas>
</main>

<footer class="social-footer">
    <a class="x-link" href="https://x.com/SWEETTAEM0718" target="_blank" rel="noopener noreferrer" aria-label="X @SWEETTAEM0718">
        <span class="x-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
                <path d="M18.9 2h3.7l-8.1 9.2L24 22h-7.5l-5.9-6.9L4.5 22H.8l8.7-9.9L0 2h7.7l5.3 6.2L18.9 2zm-1.3 17.8h2.1L6.6 4H4.4l13.2 15.8z"/>
            </svg>
        </span>
        <span class="x-handle">@SWEETTAEM0718</span>
    </a>
</footer>

<script src="js/app.js"></script>
</body>
</html>
